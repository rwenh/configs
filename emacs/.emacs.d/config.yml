# ============================================================================
# Enterprise Emacs IDE Configuration
# Version: 2.2.1
# ============================================================================
# Edit this file to customize your Emacs IDE setup
# Changes take effect after: M-x emacs-ide-config-reload

# ============================================================================
# GENERAL SETTINGS
# ============================================================================
general:
  # Theme selection
  theme: modus-vivendi          # Options: modus-vivendi, modus-operandi

  # Font configuration
  font: JetBrains Mono          # Primary font
  font-size: 11                 # Font size in points
  variable-pitch-font: Inter    # For variable-pitch modes

  # Safety
  safe-mode: false              # Set to true to boot in minimal config

  # Startup
  show-dashboard: true          # Show dashboard on startup
  restore-session: false        # Restore previous session

# ============================================================================
# COMPLETION FRAMEWORK
# ============================================================================
completion:
  backend: corfu                # Options: corfu, company
  delay: 0.1                    # Delay before showing completions (seconds)
  auto: true                    # Auto-trigger completion
  snippet-expansion: true       # Enable YASnippet
  fuzzy-matching: true          # Fuzzy completion matching
  popup-height: 20              # Max items in completion popup
  preview: true                 # Preview completions

# ============================================================================
# LSP (LANGUAGE SERVER PROTOCOL)
# ============================================================================
lsp:
  enable: true                  # Master LSP switch
  large-file-threshold: 100000  # Disable some features for files > this size
  idle-delay: 0.3               # Delay before LSP actions (seconds)
  inlay-hints: true             # Show type hints inline
  semantic-tokens: true         # Semantic highlighting
  symbol-highlighting: true     # Highlight symbol under cursor
  lens: true                    # Show code lenses
  headerline-breadcrumb: true   # Show breadcrumb in header
  sideline: true                # Show info in sideline
  signature-help: true          # Show function signatures
  hover-docs: true              # Show documentation on hover
  diagnostics-provider: flycheck  # Options: flycheck, flymake
  organize-imports: true        # Auto-organize imports

# ============================================================================
# FORMATTING
# ============================================================================
# Controls when and how code is formatted.
# on-save: true enables apheleia (async, non-blocking) format-on-save globally.
# Per-language formatters override the global default for that language.
# Set a formatter to false to disable formatting for that language entirely.
formatting:
  on-save: true                 # Format on save (via apheleia, non-blocking)
  show-errors: errors           # When to show formatter errors: errors, warnings, always

  # Per-language formatter selection.
  # Options per language: the executable name (e.g. black, prettier, rustfmt)
  # Set to false to disable formatting for that language.
  python: black                 # pip install black
  javascript: prettier          # npm install -g prettier
  typescript: prettier
  html: prettier
  css: prettier
  json: prettier
  markdown: prettier
  yaml: prettier
  rust: rustfmt                 # ships with rustup
  go: gofmt                     # ships with go
  c: clang-format               # system package manager
  cpp: clang-format
  shell: shfmt                  # go install mvdan.cc/sh/v3/cmd/shfmt@latest

# ============================================================================
# PERFORMANCE
# ============================================================================
performance:
  gc-threshold: 16777216        # 16MB - GC threshold (bytes)
  gc-percentage: 0.1            # GC percentage of heap
  startup-time-target: 2.0      # Target startup time (seconds)
  defer-heavy-packages: true    # Defer loading of heavy packages
  native-comp-jobs: 4           # Number of parallel compilation jobs
  # FIX: native-comp-deferred-compilation was REMOVED in Emacs 29.
  # The replacement is native-comp-jit-compilation (set in early-init.el).
  # This key is informational only — emacs-ide-config-apply does not apply it.
  # native-comp-deferred: true  ← REMOVED, do not use
  large-file-threshold: 10000000  # 10MB - Special handling for large files
  read-process-output-max: 4194304  # 4MB - Max process output buffer

# ============================================================================
# UI FEATURES
# ============================================================================
features:
  dashboard: true               # Startup dashboard
  which-key: true               # Show available keybindings
  beacon: true                  # Highlight cursor on scroll
  rainbow-delimiters: true      # Color-code parentheses
  rainbow-mode: true            # Show colors in color codes
  highlight-indent-guides: true # Show indentation guides
  dimmer: true                  # Dim inactive windows
  pulsar: true                  # Pulse line on certain actions
  line-numbers: true            # Show line numbers
  relative-line-numbers: true   # Relative line numbers
  column-number: true           # Show column number
  file-size: true               # Show file size
  modeline: doom-modeline       # Options: doom-modeline, powerline, default
  modeline-height: 30           # Modeline height in pixels

# ============================================================================
# PROJECT MANAGEMENT
# ============================================================================
project:
  enable: true                  # Enable Projectile
  caching: true                 # Cache project files
  indexing: hybrid              # Options: native, hybrid, alien
  default-search: ripgrep       # Options: ripgrep, grep, git-grep
  search-paths:                 # Project search paths
    - ~/projects
    - ~/work
    - ~/code
  globally-ignored-directories:
    - .git
    - node_modules
    - __pycache__
    - target
    - build
    - dist
    - .venv

# ============================================================================
# VERSION CONTROL (GIT)
# ============================================================================
git:
  enable: true                  # Enable Magit
  auto-revert: true             # Auto-revert buffers on git changes
  gutter: true                  # Show git changes in gutter
  gutter-update-interval: 0.3   # Update interval (seconds)
  blame: true                   # Enable git blame
  time-machine: true            # Enable git time machine
  fill-column: 72               # Commit message fill column
  summary-max-length: 50        # Max first line length

# ============================================================================
# TERMINAL
# ============================================================================
terminal:
  enable: true                  # Enable VTerm
  shell: /bin/bash              # Shell to use (or leave empty for $SHELL)
  max-scrollback: 100000        # Max scrollback buffer
  timer-delay: 0.01             # Timer delay for updates
  kill-buffer-on-exit: true     # Kill buffer when terminal exits
  multi-term: true              # Enable multi-terminal support

# ============================================================================
# DEBUGGING (DAP)
# ============================================================================
debug:
  enable: true                  # Master DAP switch
  auto-configure-features: true # Auto-configure debug UI
  auto-show-output: true        # Show output on debug start
  python: true                  # Python (debugpy)
  node: true                    # Node.js
  go: true                      # Go (Delve)
  rust: true                    # Rust (LLDB)
  cpp: true                     # C/C++ (LLDB/GDB)
  java: true                    # Java

# ============================================================================
# LANGUAGES
# ============================================================================
languages:
  treesit-enable: true          # Enable tree-sitter
  treesit-auto-install: true    # Auto-install grammars
  python:
    lsp-server: pyright         # Options: pyright, pylsp
    linter: flake8              # Options: flake8, pylint
  rust:
    lsp-server: rust-analyzer
  go:
    lsp-server: gopls
    imports-on-save: true
  javascript:
    lsp-server: typescript-language-server
  typescript:
    lsp-server: typescript-language-server

# ============================================================================
# SECURITY
# ============================================================================
security:
  tls-verify: true              # Verify TLS certificates
  tls-min-prime-bits: 3072      # Minimum TLS prime bits
  package-signatures: allow-unsigned  # Options: t, allow-unsigned, nil
  auth-sources:                 # Auth source files
    - ~/.authinfo.gpg
    - ~/.netrc
  network-security-level: high  # Options: high, medium, low

# ============================================================================
# TELEMETRY (LOCAL ONLY)
# ============================================================================
telemetry:
  enabled: true                 # Enable local telemetry
  usage-stats: true             # Track command usage
  startup-times: true           # Log startup times
  crash-reports: true           # Track crashes
  anonymous: true               # Keep data anonymous
  local-only: true              # Never send data externally
  max-log-size: 10485760        # 10MB - Max log file size

# ============================================================================
# ENVIRONMENT-SPECIFIC SETTINGS
# ============================================================================
environments:
  work:
    org-directory: ~/work/org
    org-agenda-files:
      - ~/work/org/work.org
      - ~/work/org/meetings.org
    project-search-paths:
      - ~/work/projects
      - ~/work/repos
    git-user-name: Your Name
    git-user-email: you@company.com
    theme: modus-operandi

  home:
    org-directory: ~/personal/org
    org-agenda-files:
      - ~/personal/org/personal.org
      - ~/personal/org/projects.org
    project-search-paths:
      - ~/code
      - ~/projects
      - ~/github
    git-user-name: Your Name
    git-user-email: you@personal.com
    theme: modus-vivendi

# ============================================================================
# CUSTOM KEYBINDINGS (OPTIONAL)
# ============================================================================
keybindings:
  # custom_save: C-x C-s
  # custom_find_file: C-x C-f

# ============================================================================
# ADVANCED SETTINGS
# ============================================================================
advanced:
  # FIX: The previous value 'error' is wrong in two ways:
  #   1. Emacs warning levels are Lisp keyword symbols: :debug :warning :error :emergency
  #      A bare string 'error' is not a valid level and would be silently ignored.
  #   2. emacs-ide-config-apply has no handler for this key, so it is not applied
  #      regardless of the value.  To change the warning level, set it directly
  #      in your init.el: (setq warning-minimum-level :warning)
  #      early-init.el manages this during startup (sets :emergency, restores :warning).
  # warning-minimum-level: :warning  ← valid format if a handler is ever added
  custom-load-path: []          # Additional directories to add to load-path
  custom-requires: []           # Additional features to require on startup
  experimental:
    use-tree-sitter-everywhere: false
    aggressive-indent: false
    auto-save-on-idle: false

# ============================================================================
# NOTES
# ============================================================================
# - Boolean values: true, false
# - Numbers: integers or floats
# - Strings: unquoted preferred for simple values and paths
# - Lists: YAML list syntax with dashes
# - Comments: lines starting with #
# - Keys use hyphens (font-size) not underscores — matches Elisp intern names
#
# Reload configuration: M-x emacs-ide-config-reload
# Edit this file:       M-x emacs-ide-config-edit
# View current config:  M-x emacs-ide-config-show
# Check formatters:     M-x emacs-ide-check-formatters
# Security audit:       M-x emacs-ide-security-check
