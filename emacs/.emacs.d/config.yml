# ============================================================================
# Enterprise Emacs IDE Configuration — v3.1.0
# ============================================================================
# Edit here, then: M-x emacs-ide-config-reload
#
# NEW in v3.1.0:
#   - Auto dark/light by time of day (theme.auto-switch)
#   - Richer corfu UX (popup-info, auto-prefix 1)
#   - Inlay hints on by default
#   - Consult hidden-file search
#   - Dimmer + pulsar + beacon tuned defaults
#   - Per-env git identity auto-applied
#   - Tab-bar integration with perspective labels
# ============================================================================

general:
  theme: ef-dark               # ef-dark ef-light ef-cherie ef-winter ef-spring …
  icons: nerd-icons            # Run: M-x nerd-icons-install-fonts (once, first launch)
  font: JetBrains Mono
  font-size: 11
  safe-mode: false
  show-dashboard: true
  restore-session: false       # true → restore prior session via perspective

completion:
  backend: corfu               # corfu (recommended) or company
  delay: 0.15
  auto: true
  snippet-expansion: true
  fuzzy-matching: true
  popup-height: 16
  preview: true
  auto-prefix: 1               # Trigger after 1 char (aggressive mode)

lsp:
  enable: true
  large-file-threshold: 100000
  idle-delay: 0.3
  inlay-hints: true
  semantic-tokens: true
  symbol-highlighting: true
  lens: true
  headerline-breadcrumb: true
  sideline: true
  signature-help: true
  hover-docs: true
  diagnostics-provider: flycheck
  organize-imports: true

formatting:
  on-save: true
  show-errors: errors

  python: black
  javascript: prettier
  typescript: prettier
  html: prettier
  css: prettier
  rust: rustfmt
  go: gofmt
  c: clang-format
  cpp: clang-format
  java: google-java-format
  kotlin: ktlint
  lua: stylua
  shell: shfmt
  sql: pg_format
  haskell: ormolu
  elixir: mix-format
  ruby: rubocop
  nix: nixpkgs-fmt
  zig: zigfmt
  clojure: cljfmt
  scala: scalafmt
  json: prettier
  markdown: prettier
  yaml: prettier
  toml: taplo
  terraform: terraform-fmt

performance:
  gc-threshold: 16777216
  gc-percentage: 0.1
  startup-time-target: 3.0
  defer-heavy-packages: true
  native-comp-jobs: 4
  large-file-threshold: 10000000
  read-process-output-max: 4194304
  slow-package-threshold: 0.1

features:
  dashboard: true
  which-key: true
  beacon: true
  rainbow-delimiters: true
  rainbow-mode: true
  highlight-indent-guides: true
  dimmer: true
  pulsar: true
  line-numbers: true
  relative-line-numbers: false  # true → relative line numbers
  column-number: true
  file-size: true
  modeline: doom-modeline
  modeline-height: 32

editing:
  meow: false                  # Emacs-native modal — off by default
  hydra: true
  surround: true

theme:
  auto-switch: false           # true → switch dark/light by time
  dark-hour: 19                # Switch to dark theme at this hour
  light-hour: 7                # Switch to light theme at this hour

workspace:
  enable: true
  auto-switch: true
  save-on-exit: true
  state-file: var/persp-state
  defaults:
    - main
    - debug
    - scratch

project:
  enable: true
  caching: true
  indexing: alien
  default-search: ripgrep
  search-paths:
    - ~/projects
    - ~/work
    - ~/code
  globally-ignored-directories:
    - .git
    - node_modules
    - __pycache__
    - target
    - build
    - dist
    - .venv
    - venv
    - .next
    - .nuxt
    - coverage
    - .cache

git:
  enable: true
  auto-revert: true
  gutter: true
  gutter-update-interval: 0.3
  blame: true
  time-machine: true
  fill-column: 72
  summary-max-length: 50

terminal:
  enable: true
  shell:                       # Empty → use $SHELL
  max-scrollback: 100000
  timer-delay: 0.01
  kill-buffer-on-exit: true
  multi-term: true

debug:
  enable: true
  auto-configure-features: true
  auto-show-output: true
  python: true
  node: true
  go: true
  rust: true
  cpp: true
  java: true

languages:
  python: true
  python-jupyter: false
  javascript: true
  typescript: true
  rust: true
  go: true
  c: true
  java: true
  kotlin: true
  scala: false
  groovy: true
  lua: true
  shell: true
  sql: true
  r: false
  julia: false
  haskell: false
  clojure: false
  elixir: false
  erlang: false
  ocaml: false
  zig: false
  nix: false
  d: false
  v: false
  ruby: false
  php: false
  prose: true

lang-settings:
  python:
    lsp-server: pyright
    linter: flake8
    formatter: black
    venv-path: ~/.virtualenvs
    imports-on-save: true

  javascript:
    lsp-server: typescript-language-server
    formatter: prettier
    test-runner: jest

  typescript:
    lsp-server: typescript-language-server
    formatter: prettier
    test-runner: jest

  rust:
    lsp-server: rust-analyzer
    formatter: rustfmt
    cargo-watch: clippy

  go:
    lsp-server: gopls
    formatter: gofmt
    imports-on-save: true

  c:
    lsp-server: clangd
    formatter: clang-format

  java:
    lsp-server: jdtls
    formatter: google-java-format
    build-tool: auto

  kotlin:
    lsp-server: kotlin-language-server
    formatter: ktlint

  scala:
    lsp-server: metals
    formatter: scalafmt

  groovy:
    lsp-server: ~
    formatter: ~

  lua:
    lsp-server: lua-language-server
    formatter: stylua

  shell:
    lsp-server: bash-language-server
    formatter: shfmt
    linter: shellcheck

  sql:
    lsp-server: sqls
    formatter: pg_format
    dialect: postgres

  haskell:
    lsp-server: haskell-language-server
    formatter: ormolu

  clojure:
    lsp-server: clojure-lsp
    formatter: cljfmt

  elixir:
    lsp-server: elixir-ls
    formatter: mix-format

  ruby:
    lsp-server: solargraph
    formatter: rubocop

  nix:
    lsp-server: nil
    formatter: nixpkgs-fmt

  zig:
    lsp-server: zls
    formatter: zigfmt

  r:
    lsp-server: r-languageserver
    formatter: ~

  julia:
    lsp-server: julia-language-server
    formatter: ~

repl:
  window-height: 0.35
  side: bottom
  auto-focus: true

security:
  tls-verify: true
  tls-min-prime-bits: 3072
  package-signatures: allow-unsigned
  auth-sources:
    - ~/.authinfo.gpg
    - ~/.netrc
  network-security-level: high

telemetry:
  enabled: true
  usage-stats: true
  startup-times: true
  crash-reports: true
  anonymous: true
  local-only: true
  max-log-size: 10485760

environments:
  work:
    org-directory: ~/work/org
    org-agenda-files:
      - ~/work/org/work.org
      - ~/work/org/meetings.org
    project-search-paths:
      - ~/work/projects
      - ~/work/repos
    git-user-name: Your Name
    git-user-email: you@company.com
    theme: ef-light

  home:
    org-directory: ~/personal/org
    org-agenda-files:
      - ~/personal/org/personal.org
      - ~/personal/org/projects.org
    project-search-paths:
      - ~/code
      - ~/projects
      - ~/github
    git-user-name: Your Name
    git-user-email: you@personal.com
    theme: ef-dark

advanced:
  custom-load-path: []
  custom-requires: []
  experimental:
    use-tree-sitter-everywhere: false
    aggressive-indent: false
    auto-save-on-idle: false

# ============================================================================
# QUICK REFERENCE
# ============================================================================
# M-x emacs-ide-config-reload      Reload after editing
# M-x emacs-ide-config-show        View current values
# M-x emacs-ide-diagnose           Comprehensive diagnostics
# M-x emacs-ide-health-check-all   System health report
# M-x emacs-ide-spot-check         Command/keybinding integrity
# M-x emacs-ide-lsp-check-servers  Which LSP servers are on PATH
# M-x emacs-ide-check-formatters   Which formatters are on PATH
# F12                              Toggle dark ↔ light theme
# M-x emacs-ide-theme-enable-auto  Auto dark/light by time of day
